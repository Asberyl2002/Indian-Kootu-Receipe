<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Layout</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <p>💛 OUR RECIPES, YOUR INBOX. <span>SIGN UP</span></p>
    <button class="close-btn">×</button>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">Tasty <span>Treat</span></div>

    <nav>
      <a href="#">HOME</a>
      <a href="#">ABOUT</a>
      <a href="#">RECIPES</a>
      <a href="#">🔍</a>
    </nav>
  </header>

  <!-- Hero Text -->
  <section class="hero">
    <h1>
      SIMPLE RECIPES MADE FOR
      <span>real, actual, everyday life.</span>
    </h1>
  </section>

  <!-- Image Grid -->
  <section class="grid">
    <div class="card">/></div>
    <div class="card"><img src="https://source.unsplash.com/400x400/?salad,bowl" /></div>
    <div class="card"><img src="https://source.unsplash.com/400x400/?rice,food" /></div>
    <div class="card"><img src="https://source.unsplash.com/400x400/?noodles,food" /></div>
  </section>

</body>
</html>
